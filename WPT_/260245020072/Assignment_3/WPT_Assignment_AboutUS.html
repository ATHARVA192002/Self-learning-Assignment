<html>
<head>
<title>NewUser</title>
</head>

<body>

<form>

<fieldset>
<legend>New User Registration</legend>

<label>First Name</label>
<input type="text" name="fname" required><br><br>

<label>Last Name</label>
<input type="text" name="lname" required><br><br>

<label>Username</label>
<input type="text" name="uname" required><br><br>

<label>Email</label>
<input type="email" name="email" required><br><br>

<label>Password</label>
<input type="password" name="pass" minlength="6" required><br><br>

<label>Re-enter Password</label>
<input type="password" name="repass" minlength="6" required><br><br>

<label>Gender</label>
<input type="radio" name="gender" required>Male
<input type="radio" name="gender">Female
<br><br>

<label>Languages You Know</label>
<input type="checkbox" name="lang">English
<input type="checkbox" name="lang">Marathi
<input type="checkbox" name="lang">Hindi
<br><br>

<button type="submit">Register</button>

</fieldset>

</form>

</body>
</html>
