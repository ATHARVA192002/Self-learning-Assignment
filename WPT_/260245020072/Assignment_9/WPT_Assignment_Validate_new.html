<html>
<head>
<title>Validation</title>
</head>

<body>

<form name="form1" onsubmit="return validate()">

<fieldset>
<legend>Username Validation</legend>

<label>Username</label>
<input type="text" name="fname" required minlength="3" maxlength="20"><br><br>

<input type="submit" value="submit">

</fieldset>

</form>

<script>

function validate()
{
    let data = document.forms["form1"]["fname"].value;

    if(data.trim() == "" || data.length <= 2 || !isNaN(data))
    {
        alert("Username should not be empty and should have more than 2 characters");
        return false;
    }

}

</script>

</body>
</html>
