<html>
<head>
 <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
 
 <script>
	$(document).ready(function()
	{
		$("#sb").click(function()
		{
			let data = {
							StudentID : document.querySelector('#sid').value,
							Name : document.querySelector('#name').value
						}
			console.log(data);
			
			let table = document.getElementById("t1");
			
			let row = table.insertRow();

			let c1 = row.insertCell(0);
			let c2 = row.insertCell(1);

			c1.innerHTML = data.StudentID;
			c2.innerHTML = data.Name;
		}
		);
		
	}
	);
 </script>
</head>

<body>

<form name="form1" >

<fieldset>
<legend>New Student Registration</legend>

<label>StudentID</label>
<input type="number" id="sid" required><br><br>

<label>Student Name</label>
<input type="text" id="name" required><br><br>

<input type="button" id="sb" value="submit">

<table id="t1" border="1">
<tr>
<th>Student ID</th>
<th>Student Name</th>
</tr>
</table>

</fieldset>

</form>
</body>
</html>
