<html>
<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script>
$(document).ready(function(){
	$("#b1").click(function(){
		$("#d1").animate({left:"500px"});
		$("#d1").animate({height:"200px"});
		$("#d1").animate({width:"200px"});
		
			
	})
})


</script>

</head>

<body>

<button id="b1">start</button>
<br><br>
<div id="d1" style="width:50px;height:50px;background-color:red;position:relative"></div>


</body>
</html>
